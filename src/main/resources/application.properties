spring.profiles.active=dev

spring.datasource.url=jdbc:mysql://localhost:3306/sbmdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

gg.jte.development-mode=true
gg.jte.template-location=src/main/jte

spring.web.error.whitelabel.enabled=false